services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alphalens
      POSTGRES_USER: alphalens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alphalens_secret}
    volumes:
      - ./.docker-data/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphalens"]
      interval: 10s
      timeout: 5s
      retries: 5

  alphalens:
    build: .
    container_name: alphalens
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - TZ=Asia/Seoul
      - DATABASE_URL=postgresql+asyncpg://alphalens:${POSTGRES_PASSWORD:-alphalens_secret}@postgres:5432/alphalens
    volumes:
      - ./.docker-data/hf-cache:/app/.hf_cache
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
